<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARQUENIX Mobile</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      --bg: #07111d;
      --card: rgba(18, 35, 53, 0.9);
      --line: rgba(151, 181, 212, 0.18);
      --text: #edf6ff;
      --muted: #9fb0c3;
      --blue: #2477ff;
      --green: #55d76a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 5%, rgba(36, 119, 255, 0.32), transparent 34%),
        linear-gradient(160deg, #050b13, #0b1d31 58%, #06101c);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .phone {
      width: min(420px, 100%);
      min-height: 760px;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: rgba(4, 12, 21, 0.92);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }
    .screen { padding: 22px; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { margin: 0; font-size: 28px; }
    p { color: var(--muted); line-height: 1.5; }
    .badge { padding: 8px 12px; border-radius: 999px; color: #c8ffd0; background: rgba(85, 215, 106, 0.18); }
    .card {
      margin-top: 16px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
    }
    .weather { display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: center; }
    .weather .icon { font-size: 44px; }
    .weather strong { font-size: 42px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .metric { padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.05); }
    .metric span { color: var(--muted); font-size: 13px; }
    .metric strong { display: block; margin-top: 6px; font-size: 22px; }
    .tank {
      height: 170px;
      border: 1px solid rgba(61,183,255,.32);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: rgba(5, 18, 31, 0.8);
    }
    .fill { position: absolute; inset: auto 0 0; height: 62%; background: linear-gradient(#3db7ff, #2477ff); }
    .tank strong { z-index: 1; font-size: 44px; }
    .zone { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); }
    a.button {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 48px;
      margin-top: 12px;
      border-radius: 14px;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      background: linear-gradient(90deg, var(--blue), #1884ff);
    }
    .secondary { background: rgba(255,255,255,.08) !important; border: 1px solid var(--line); }
  </style>
</head>
<body>
  <main class="phone">
    <section class="screen">
      <div class="top">
        <div>
          <h1>ARQUENIX</h1>
          <p>Мобильдік басқару қосымшасы</p>
        </div>
        <span class="badge">Online</span>
      </div>

      <article class="card weather">
        <div class="icon">🌦</div>
        <div>
          <span>Алматы, Қазақстан</span>
          <strong>18°C</strong>
          <p>Жауын ықтималдығы 40%</p>
        </div>
      </article>

      <article class="card">
        <h2>Су қоры</h2>
        <div class="tank"><div class="fill"></div><strong>62%</strong></div>
      </article>

      <section class="grid">
        <div class="metric"><span>Топырақ</span><strong>48%</strong></div>
        <div class="metric"><span>Күн қуаты</span><strong>285 W</strong></div>
        <div class="metric"><span>Жел</span><strong>3 м/с</strong></div>
        <div class="metric"><span>AQI</span><strong>28</strong></div>
      </section>

      <article class="card">
        <h2>Суару аймақтары</h2>
        <div class="zone"><span>Аймақ 1</span><strong>Қосулы</strong></div>
        <div class="zone"><span>Аймақ 2</span><strong>Қосулы</strong></div>
        <div class="zone"><span>Аймақ 3</span><strong>Өшірулі</strong></div>
      </article>

      <a class="button" href="https://wa.me/77766193034">WhatsApp байланыс</a>
      <a class="button secondary" href="index.html">Сайтқа қайту</a>
    </section>
  </main>
</body>
</html>
